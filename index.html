<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>糖分跑酷 · Sugar Run（巧乐兹 × 雪碧）</title>
<style>
  :root{
    --accent:#ffcb2e;
    --accent2:#ff7a3d;
    --sprite:#2ecc71;
    --danger:#ff4d4f;
    --ink:#1c1430;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:#0e0b1a;
    color:#fff;
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    -webkit-user-select:none;user-select:none;
  }
  #wrap{
    position:relative;
    width:100vw;height:100vh;
    max-width:520px;
    margin:auto;
    box-shadow:0 0 60px rgba(0,0,0,.6);
    overflow:hidden;
    background:#13102a;
  }
  canvas{display:block;width:100%;height:100%;touch-action:none;}

  /* ---------- HUD ---------- */
  .hud{position:absolute;inset:0;pointer-events:none;}
  .topbar{
    position:absolute;top:14px;left:14px;right:14px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
  }
  .panel{
    background:rgba(20,14,40,.55);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:8px 14px;
  }
  .score-num{font-size:26px;font-weight:800;line-height:1;letter-spacing:.5px;
    background:linear-gradient(180deg,#fff,#ffe39a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .label{font-size:11px;opacity:.7;letter-spacing:2px;margin-bottom:2px;}
  .stat{display:flex;gap:18px;}
  .stat .v{font-size:15px;font-weight:700;}
  .stat .k{font-size:10px;opacity:.6;}

  /* sugar meter */
  .sugarWrap{
    position:absolute;left:50%;bottom:20px;transform:translateX(-50%);
    width:min(86%,420px);
  }
  .sugarTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;
    font-size:12px;font-weight:700;letter-spacing:1px;}
  .sugarTop .warn{color:var(--danger);opacity:0;transition:opacity .2s;}
  .sugarTop .warn.on{opacity:1;animation:blink .5s steps(2,jump-none) infinite;}
  @keyframes blink{50%{opacity:.25;}}
  .bar{height:16px;border-radius:10px;background:rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.18);overflow:hidden;position:relative;}
  .fill{height:100%;width:0%;border-radius:10px;
    background:linear-gradient(90deg,#43e97b,#f9d423 55%,#ff512f);
    transition:width .08s linear;box-shadow:0 0 12px rgba(255,180,40,.5);}
  .ticks{position:absolute;inset:0;display:flex;}
  .ticks span{flex:1;border-right:1px solid rgba(255,255,255,.10);}

  /* ---------- Overlays ---------- */
  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;gap:18px;padding:28px;
    background:radial-gradient(120% 120% at 50% 0%,rgba(40,20,70,.4),rgba(8,6,18,.92));
    pointer-events:auto;
  }
  .hidden{display:none!important;}
  .title{
    font-size:clamp(34px,9vw,52px);font-weight:900;line-height:1.05;
    background:linear-gradient(180deg,#fff,var(--accent) 60%,var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 6px 30px rgba(255,140,40,.25);
  }
  .sub{font-size:14px;opacity:.85;max-width:340px;line-height:1.7;}
  .emojiRow{font-size:34px;letter-spacing:6px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));}
  .btn{
    pointer-events:auto;cursor:pointer;border:none;
    font-family:inherit;font-weight:800;font-size:18px;color:var(--ink);
    padding:15px 42px;border-radius:50px;
    background:linear-gradient(180deg,#ffe27a,var(--accent2));
    box-shadow:0 10px 24px rgba(255,120,40,.45),inset 0 2px 0 rgba(255,255,255,.6);
    transition:transform .08s,box-shadow .12s;
  }
  .btn:active{transform:translateY(2px) scale(.98);box-shadow:0 4px 14px rgba(255,120,40,.4);}
  .hint{font-size:12px;opacity:.6;line-height:1.9;}
  .keys b{background:rgba(255,255,255,.14);border-radius:6px;padding:2px 8px;margin:0 2px;font-size:12px;}
  .reason{font-size:20px;font-weight:800;}
  .reason.sugar{color:var(--accent);}
  .reason.crash{color:#ff7a7a;}
  .bigscore{font-size:46px;font-weight:900;
    background:linear-gradient(180deg,#fff,#ffe39a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .best{font-size:13px;opacity:.75;}
  .disc{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;opacity:.45;}
  .controlsRow{display:flex;gap:14px;margin-top:4px;}
  @media (max-width:520px){.hint .keys{display:none;}}

  /* mute button */
  #muteBtn{
    position:absolute;top:74px;right:14px;pointer-events:auto;cursor:pointer;
    width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.18);
    background:rgba(20,14,40,.55);backdrop-filter:blur(6px);
    color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;
    transition:transform .08s;
  }
  #muteBtn:active{transform:scale(.92);}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
  <button id="muteBtn" title="音乐开关">🔊</button>

  <!-- HUD -->
  <div class="hud" id="hud">
    <div class="topbar">
      <div class="panel">
        <div class="label">SCORE</div>
        <div class="score-num" id="score">0</div>
      </div>
      <div class="panel stat">
        <div><div class="k">距离</div><div class="v" id="dist">0m</div></div>
        <div><div class="k">最高</div><div class="v" id="best">0</div></div>
      </div>
    </div>

    <div class="sugarWrap">
      <div class="sugarTop">
        <span>糖分槽 SUGAR</span>
        <span class="warn" id="warn">⚠ 快爆表了！别再吃了</span>
      </div>
      <div class="bar">
        <div class="fill" id="sugarFill"></div>
        <div class="ticks"><span></span><span></span><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>

  <!-- Start screen -->
  <div class="screen" id="menu">
    <div class="emojiRow">🍫 🥤 🏃</div>
    <div class="title">糖分跑酷</div>
    <div class="sub">沿路狂吃 <b>巧乐兹</b>、猛灌 <b>雪碧</b> 拿高分，<br>
      但短时间吃喝太多会 <b style="color:var(--accent)">糖分爆表，当场晕倒</b>！<br>
      边跑边躲跑步机和护栏，跑得越远越快。</div>
    <button class="btn" id="playBtn">开始跑酷</button>
    <div class="hint keys">
      <b>← →</b> / <b>A D</b> 换道 &nbsp;·&nbsp; <b>↑</b> / <b>空格</b> 跳跃<br>
      手机：左右滑动换道，向上滑跳跃
    </div>
    <div class="disc">本游戏纯属虚构娱乐 · 角色与情节均为创作，请勿对号入座</div>
  </div>

  <!-- Game over -->
  <div class="screen hidden" id="over">
    <div class="emojiRow" id="overEmoji">😵‍💫</div>
    <div class="reason" id="reason">糖分超标，倒在路上了！</div>
    <div>
      <div class="label" style="text-align:center">本局得分</div>
      <div class="bigscore" id="finalScore">0</div>
      <div class="best" id="overBest">最高分 0</div>
    </div>
    <button class="btn" id="againBtn">再来一局</button>
    <div class="hint" id="tip"></div>
  </div>
</div>

<script>
(()=>{
"use strict";
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const wrap = document.getElementById('wrap');

// ---- DOM HUD refs ----
const elScore=document.getElementById('score');
const elDist=document.getElementById('dist');
const elBest=document.getElementById('best');
const elFill=document.getElementById('sugarFill');
const elWarn=document.getElementById('warn');
const elMenu=document.getElementById('menu');
const elOver=document.getElementById('over');
const elFinal=document.getElementById('finalScore');
const elOverBest=document.getElementById('overBest');
const elReason=document.getElementById('reason');
const elOverEmoji=document.getElementById('overEmoji');
const elTip=document.getElementById('tip');

// ---- canvas sizing ----
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=wrap.clientWidth; H=wrap.clientHeight;
  cvs.width=W*DPR; cvs.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);
resize();

// ---- perspective projection ----
// d: world distance from player (0 = at player). returns screen pos + scale.
const FOCAL=4.2;
function horizonY(){return H*0.30;}
function laneSpacingPx(){return Math.min(W*0.20,118);}
function project(d, laneMul){
  const p=FOCAL/(FOCAL+Math.max(d,-0.5));
  const hy=horizonY();
  return {
    x: W/2 + laneMul*laneSpacingPx()*p,
    y: hy + p*(H - hy),
    p
  };
}

// ---- game constants ----
const LANES=[-1,0,1];
const MAXD=27;
const PLAYER_BASE_Y_FACTOR=0.84;
const best0=+(localStorage.getItem('sugarrun_best')||0);

// ---- state ----
let state='menu';
let objs=[];            // {type,lane,d,resolved,bob}
let particles=[];       // floating score / stars
let player;
let speed, totalDist, score, collectScore, sugar, sugarFlash;
let distSinceSpawn, runCycle, shake, time;
let best=best0;
elBest.textContent=best;

function reset(){
  objs=[]; particles=[];
  player={lane:1, displayLane:1, yOff:0, vy:0, jumping:false, stumble:0};
  speed=8.0; totalDist=0; score=0; collectScore=0;
  sugar=0; sugarFlash=0; distSinceSpawn=0; runCycle=0; shake=0; time=0;
}

// ---------- spawning ----------
function spawnRow(){
  const r=Math.random();
  const pattern=[]; // per lane: null | 'barrier' | 'treadmill' | 'ice' | 'sprite'
  let obstacles=0;
  for(let i=0;i<3;i++){
    const k=Math.random();
    if(k<0.22){pattern[i]='barrier';obstacles++;}
    else if(k<0.34){pattern[i]='treadmill';obstacles++;}
    else if(k<0.55){pattern[i]='ice';}
    else if(k<0.73){pattern[i]='sprite';}
    else pattern[i]=null;
  }
  // guarantee at least one passable lane
  if(obstacles>=3){pattern[Math.floor(Math.random()*3)]=Math.random()<0.5?'ice':null;}
  for(let i=0;i<3;i++){
    if(pattern[i]){
      objs.push({type:pattern[i],lane:i,d:MAXD,resolved:false,bob:Math.random()*6.28});
    }
  }
}

// ---------- input ----------
function moveLane(dir){
  if(state!=='playing')return;
  player.lane=Math.max(0,Math.min(2,player.lane+dir));
}
function jump(){
  if(state!=='playing')return;
  if(!player.jumping){player.jumping=true;player.vy=-12.5;}
}
window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
  if(state==='menu'&&(e.key===' '||e.key==='Enter')){startGame();return;}
  if(state==='over'&&(e.key===' '||e.key==='Enter')){startGame();return;}
  const k=e.key.toLowerCase();
  if(e.key==='ArrowLeft'||k==='a')moveLane(-1);
  else if(e.key==='ArrowRight'||k==='d')moveLane(1);
  else if(e.key==='ArrowUp'||k==='w'||e.key===' ')jump();
});
// touch swipe
let tx=0,ty=0,tActive=false;
cvs.addEventListener('touchstart',e=>{const t=e.changedTouches[0];tx=t.clientX;ty=t.clientY;tActive=true;},{passive:true});
cvs.addEventListener('touchend',e=>{
  if(!tActive)return;tActive=false;
  const t=e.changedTouches[0];const dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.abs(dx)<24&&Math.abs(dy)<24){jump();return;}
  if(Math.abs(dx)>Math.abs(dy)){moveLane(dx>0?1:-1);}
  else{if(dy<0)jump();}
},{passive:true});

document.getElementById('playBtn').onclick=startGame;
document.getElementById('againBtn').onclick=startGame;

// ---------- background music ----------
const bgm=document.getElementById('bgm');
const muteBtn=document.getElementById('muteBtn');
let muted=false;
bgm.volume=0.55;
function playBGM(){
  if(muted)return;
  // called from a user gesture (button/key) so autoplay policy is satisfied
  const pr=bgm.play();
  if(pr&&pr.catch)pr.catch(()=>{});
}
muteBtn.onclick=(e)=>{
  e.stopPropagation();
  muted=!muted;
  muteBtn.textContent=muted?'🔇':'🔊';
  if(muted){bgm.pause();}
  else{playBGM();}
};

function startGame(){
  reset();
  state='playing';
  elMenu.classList.add('hidden');
  elOver.classList.add('hidden');
  playBGM();
}

// ---------- update ----------
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now;
  if(dt>0.05)dt=0.05;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function popup(text,color,laneMul,d){
  const pr=project(d,laneMul);
  particles.push({kind:'text',text,color,x:pr.x,y:pr.y-30*pr.p,life:1,vy:-40});
}
function stars(x,y){
  for(let i=0;i<10;i++){
    particles.push({kind:'star',x,y,
      vx:(Math.random()-.5)*120,vy:-Math.random()*150-40,
      life:1,rot:Math.random()*6.28});
  }
}

function update(dt){
  time+=dt;
  // animate menu background even when not playing
  if(state!=='playing'){
    runCycle+=dt*4;
    updateParticles(dt);
    return;
  }

  // difficulty ramp
  speed=Math.min(8+totalDist*0.028,20);
  totalDist+=speed*dt;
  runCycle+=dt*(speed*1.1);

  // smooth lane slide
  player.displayLane+=(player.lane-player.displayLane)*Math.min(1,dt*14);
  // jump physics
  if(player.jumping){
    player.vy+=42*dt;
    player.yOff+=player.vy*dt*60/60*4.2;
    if(player.yOff>=0){player.yOff=0;player.jumping=false;player.vy=0;}
  }
  if(player.stumble>0)player.stumble-=dt;

  // sugar decay (metabolize)
  sugar=Math.max(0,sugar-9*dt);
  if(sugar>=100){ gameOver('sugar'); return; }
  sugarFlash=Math.max(0,sugarFlash-dt);
  if(shake>0)shake-=dt;

  // spawn rows
  distSinceSpawn+=speed*dt;
  if(distSinceSpawn>=5.4){distSinceSpawn=0;spawnRow();}

  // move + resolve objects
  const inAir = player.yOff < -26;
  for(const o of objs){
    o.d-=speed*dt;
    if(!o.resolved && o.d<=0.22){
      o.resolved=true;
      if(o.lane===player.lane){
        if(o.type==='ice'){
          collectScore+=50; sugar=Math.min(100,sugar+15);
          sugarFlash=0.35; popup('+50 🍫','#ffd27a',LANES[o.lane],0.5);
          if(sugar>=100){gameOver('sugar');return;}
        } else if(o.type==='sprite'){
          collectScore+=30; sugar=Math.min(100,sugar+11);
          sugarFlash=0.35; popup('+30 🥤','#7CFC9A',LANES[o.lane],0.5);
          if(sugar>=100){gameOver('sugar');return;}
        } else if(o.type==='barrier'){
          if(!inAir){gameOver('crash');return;}
        } else if(o.type==='treadmill'){
          gameOver('crash');return; // must change lane
        }
      }
    }
  }
  objs=objs.filter(o=>o.d>-1.2);

  // score
  score=Math.floor(totalDist)+collectScore;

  updateParticles(dt);
  updateHUD();
}

function updateParticles(dt){
  for(const p of particles){
    p.life-=dt*(p.kind==='star'?1.4:1.1);
    if(p.kind==='star'){p.vy+=300*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;}
    else{p.y+=p.vy*dt;}
  }
  particles=particles.filter(p=>p.life>0);
}

function gameOver(reason){
  state='over';
  shake=0.4;
  if(reason==='sugar'){stars(W/2,H*PLAYER_BASE_Y_FACTOR-40);}
  if(score>best){best=score;localStorage.setItem('sugarrun_best',best);}
  elBest.textContent=best;
  elFinal.textContent=score;
  elOverBest.textContent='最高分 '+best;
  if(reason==='sugar'){
    elReason.textContent='🍫🥤 糖分超标，当场晕倒！';
    elReason.className='reason sugar';
    elOverEmoji.textContent='😵‍💫';
    elTip.textContent='提示：别在短时间内连吃猛喝，让糖分槽降下来再补给。';
  }else{
    elReason.textContent='💥 撞上障碍，翻车了！';
    elReason.className='reason crash';
    elOverEmoji.textContent='🤕';
    elTip.textContent='提示：跑步机必须换道躲避，护栏可以跳过去。';
  }
  elOver.classList.remove('hidden');
}

function updateHUD(){
  elScore.textContent=score;
  elDist.textContent=Math.floor(totalDist)+'m';
  const pct=Math.min(100,sugar);
  elFill.style.width=pct+'%';
  if(pct>78){elWarn.classList.add('on');}else{elWarn.classList.remove('on');}
}

// ---------- rendering ----------
function render(){
  let sx=0,sy=0;
  if(shake>0){sx=(Math.random()-.5)*shake*22;sy=(Math.random()-.5)*shake*22;}
  ctx.save();
  ctx.translate(sx,sy);
  drawSky();
  drawGround();
  drawScenery();
  drawRoadMarks();
  // draw objects far->near
  const sorted=objs.slice().sort((a,b)=>b.d-a.d);
  for(const o of sorted)drawObject(o);
  drawPlayer();
  drawParticles();
  // sugar flash vignette
  if(sugarFlash>0){
    ctx.fillStyle=`rgba(255,200,60,${sugarFlash*0.5})`;
    ctx.fillRect(-30,-30,W+60,H+60);
  }
  if(sugar>85&&state==='playing'){
    const a=(sugar-85)/15*0.4*(0.6+0.4*Math.sin(time*12));
    ctx.fillStyle=`rgba(255,40,40,${a})`;
    ctx.fillRect(-30,-30,W+60,H+60);
  }
  ctx.restore();
}

function drawSky(){
  const hy=horizonY();
  const g=ctx.createLinearGradient(0,0,0,hy+40);
  g.addColorStop(0,'#3a1d6e');
  g.addColorStop(.45,'#7b3f9c');
  g.addColorStop(.8,'#ff7a52');
  g.addColorStop(1,'#ffd36b');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,hy+40);
  // sun
  const sunY=hy-30+8*Math.sin(time*0.4);
  const sg=ctx.createRadialGradient(W*0.5,sunY,4,W*0.5,sunY,90);
  sg.addColorStop(0,'rgba(255,247,210,.95)');
  sg.addColorStop(1,'rgba(255,200,90,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W*0.5,sunY,90,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,250,225,.95)';
  ctx.beginPath();ctx.arc(W*0.5,sunY,30,0,7);ctx.fill();
}

function drawGround(){
  const hy=horizonY();
  // grass / ground
  const gg=ctx.createLinearGradient(0,hy,0,H);
  gg.addColorStop(0,'#2c8a5a');gg.addColorStop(1,'#1c5e3d');
  ctx.fillStyle=gg;ctx.fillRect(0,hy,W,H-hy);
  // road polygon
  const tl=project(MAXD,-1.8),bl=project(0,-1.8);
  const tr=project(MAXD,1.8),br=project(0,1.8);
  const rg=ctx.createLinearGradient(0,hy,0,H);
  rg.addColorStop(0,'#4a4a55');rg.addColorStop(1,'#33333c');
  ctx.fillStyle=rg;
  ctx.beginPath();
  ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
  ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
  ctx.closePath();ctx.fill();
  // road edges
  ctx.lineWidth=Math.max(2,W*0.012);
  ctx.strokeStyle='rgba(255,255,255,.75)';
  ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(bl.x,bl.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.stroke();
}

function drawRoadMarks(){
  // scrolling dashes on the two inner lane dividers
  const seg=2.2;
  const phase=(state==='playing'?totalDist:time*4)%seg;
  for(const laneMul of [-0.5,0.5]){
    for(let i=0;i<14;i++){
      const d0=i*seg - phase;
      const d1=d0+1.1;
      if(d1<=0||d0>MAXD)continue;
      const a=project(Math.max(d0,0.02),laneMul);
      const b=project(Math.max(d1,0.02),laneMul);
      ctx.strokeStyle='rgba(255,220,120,.85)';
      ctx.lineWidth=Math.max(1.5,8*a.p);
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
  }
}

function drawScenery(){
  // simple parallax buildings along both sides
  const seg=4.0;
  const phase=(state==='playing'?totalDist:time*4)%seg;
  for(let side of [-1,1]){
    for(let i=0;i<9;i++){
      const d=i*seg - phase + (side<0?0:2.0);
      if(d<=0.1||d>MAXD)continue;
      const base=project(d, side*2.5);
      const h=(60+((i*53+ (side<0?17:91))%70))*base.p;
      const w=46*base.p;
      const hue=(i*47+(side<0?0:120))%360;
      ctx.fillStyle=`hsl(${(260+hue)%360},35%,${28+ (i%3)*6}%)`;
      ctx.fillRect(base.x - (side<0?w:0), base.y-h, w, h);
      // windows
      ctx.fillStyle='rgba(255,220,140,.5)';
      for(let wy=0;wy<3;wy++)for(let wx=0;wx<2;wx++){
        if((i+wy+wx)%2===0)
          ctx.fillRect(base.x-(side<0?w:0)+w*0.18+wx*w*0.42, base.y-h+h*0.15+wy*h*0.27, w*0.22, h*0.14);
      }
    }
  }
}

function drawObject(o){
  const laneMul=LANES[o.lane];
  const pr=project(o.d,laneMul);
  if(pr.p<=0.02)return;
  const bob=Math.sin(time*4+o.bob)*4*pr.p;
  const x=pr.x, y=pr.y+bob, s=pr.p;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();ctx.ellipse(pr.x,pr.y+4*s,28*s,9*s,0,0,7);ctx.fill();

  if(o.type==='ice')drawIceCream(x,y,s);
  else if(o.type==='sprite')drawSprite(x,y,s);
  else if(o.type==='barrier')drawBarrier(pr.x,pr.y,s);
  else if(o.type==='treadmill')drawTreadmill(pr.x,pr.y,s);
}

function drawIceCream(x,y,s){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  // glow
  ctx.shadowColor='rgba(255,180,60,.6)';ctx.shadowBlur=16;
  // stick
  ctx.shadowBlur=0;
  ctx.fillStyle='#d9a566';
  ctx.fillRect(-3,8,6,30);
  // choco bar body
  const grd=ctx.createLinearGradient(0,-46,0,12);
  grd.addColorStop(0,'#6b3d1e');grd.addColorStop(1,'#3c2010');
  ctx.fillStyle=grd;
  roundRect(-20,-46,40,58,12);ctx.fill();
  // vanilla bite
  ctx.fillStyle='#fff4dd';
  roundRect(-13,-40,12,30,6);ctx.fill();
  // sprinkles / crunch bits
  ctx.fillStyle='#8a5a2b';
  for(let i=0;i<8;i++){
    const ang=i*0.9, rx=Math.cos(ang)*12, ry=-22+Math.sin(ang)*16;
    ctx.beginPath();ctx.arc(rx+6,ry,2.4,0,7);ctx.fill();
  }
  // label
  ctx.fillStyle='#ffd86b';
  roundRect(-15,-4,30,11,4);ctx.fill();
  ctx.fillStyle='#5a3210';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
  ctx.fillText('巧乐兹',0,4.5);
  ctx.restore();
}

function drawSprite(x,y,s){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  // can body
  const grd=ctx.createLinearGradient(-16,0,16,0);
  grd.addColorStop(0,'#0f6b32');grd.addColorStop(.45,'#37c46a');grd.addColorStop(.55,'#9bf0bd');grd.addColorStop(1,'#0f6b32');
  ctx.fillStyle=grd;
  roundRect(-16,-30,32,52,8);ctx.fill();
  // top rim
  ctx.fillStyle='#cfd6da';roundRect(-16,-34,32,8,4);ctx.fill();
  ctx.fillStyle='#9aa3a8';ctx.fillRect(-6,-36,12,3);
  // silver splash band
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.beginPath();ctx.moveTo(-16,-6);ctx.quadraticCurveTo(0,-14,16,-4);
  ctx.lineTo(16,6);ctx.quadraticCurveTo(0,0,-16,8);ctx.closePath();ctx.fill();
  // label
  ctx.fillStyle='#0f6b32';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('雪碧',0,2);
  ctx.restore();
}

function drawBarrier(x,y,s){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  ctx.fillStyle='rgba(0,0,0,.25)';
  // legs
  ctx.fillStyle='#c43b2a';ctx.fillRect(-34,-6,8,22);ctx.fillRect(26,-6,8,22);
  // striped bar
  for(let i=0;i<8;i++){
    ctx.fillStyle=i%2?'#ffffff':'#ff7a1a';
    ctx.fillRect(-38+i*9.5,-26,9.5,18);
  }
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;ctx.strokeRect(-38,-26,76,18);
  ctx.restore();
}

function drawTreadmill(x,y,s){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  // belt deck
  ctx.fillStyle='#222633';roundRect(-30,-6,60,20,6);ctx.fill();
  ctx.fillStyle='#3a4050';roundRect(-30,-6,60,7,4);ctx.fill();
  // moving belt lines
  const ph=(time*6)%8;
  ctx.strokeStyle='#11141d';ctx.lineWidth=2;
  for(let i=0;i<8;i++){const lx=-28+((i*8+ph)%56);ctx.beginPath();ctx.moveTo(lx,-2);ctx.lineTo(lx,8);ctx.stroke();}
  // console / handle
  ctx.strokeStyle='#9aa3b2';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(-26,-6);ctx.lineTo(-30,-46);ctx.lineTo(8,-46);ctx.stroke();
  ctx.fillStyle='#1a1d29';roundRect(-2,-58,28,16,4);ctx.fill();
  ctx.fillStyle='#52e0ff';ctx.fillRect(2,-54,20,8);
  ctx.restore();
}

function drawPlayer(){
  const baseY=H*PLAYER_BASE_Y_FACTOR;
  const x=W/2+(player.displayLane-1)*laneSpacingPx();
  const y=baseY+player.yOff;
  const s=Math.min(W/420,1.25);
  // shadow shrinks when jumping
  const sh=1-Math.min(0.6,(-player.yOff)/120);
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(x,baseY+34*s,30*s*sh,9*s*sh,0,0,7);ctx.fill();
  drawRunner(x,y,s,runCycle,state==='over');
}

function drawRunner(x,y,s,t,fallen){
  ctx.save();ctx.translate(x,y);
  if(fallen){ // lie down comedic
    ctx.rotate(Math.PI/2*0.92);ctx.translate(0,-6);
  }
  ctx.scale(s,s);
  const swing=Math.sin(t)*0.6;
  const swing2=Math.sin(t+Math.PI)*0.6;
  const lift=Math.abs(Math.sin(t))*3;
  // back leg
  limb(0,8, swing2, '#2b3a67', 7);
  // back arm
  limb(0,-16, -swing*0.8, '#e8643c', 5,true);
  // body
  const bg=ctx.createLinearGradient(0,-26,0,12);
  bg.addColorStop(0,'#ff9a3c');bg.addColorStop(1,'#ff6f3c');
  ctx.fillStyle=bg;roundRect(-11,-24,22,34,9);ctx.fill();
  // chest stripe
  ctx.fillStyle='rgba(255,255,255,.85)';roundRect(-7,-18,14,6,3);ctx.fill();
  // front leg
  limb(0,8, swing, '#3450a0', 7);
  // front arm
  limb(0,-16, swing*0.9, '#ff8a4a', 5,true);
  // head
  ctx.fillStyle='#ffd9a8';
  ctx.beginPath();ctx.arc(0,-34+(-lift*0.2),12,0,7);ctx.fill();
  // hair
  ctx.fillStyle='#2a2233';
  ctx.beginPath();ctx.arc(0,-38,12,Math.PI*1.05,Math.PI*2.0);ctx.fill();
  ctx.fillRect(-12,-40,24,5);
  // glasses (light nod)
  ctx.strokeStyle='#2a2233';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(-4,-33,3.4,0,7);ctx.arc(5,-33,3.4,0,7);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-0.6,-33);ctx.lineTo(1.6,-33);ctx.stroke();
  if(fallen){ // dizzy mouth
    ctx.fillStyle='#7a3b2a';ctx.beginPath();ctx.arc(0,-27,2.4,0,7);ctx.fill();
  }
  ctx.restore();
}
function limb(ox,oy,ang,color,wdt,arm){
  ctx.save();ctx.translate(ox,oy);ctx.rotate(ang);
  ctx.strokeStyle=color;ctx.lineWidth=wdt;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,arm?16:20);ctx.stroke();
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    if(p.kind==='text'){
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color;ctx.font='bold 18px "PingFang SC",sans-serif';
      ctx.textAlign='center';
      ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=6;
      ctx.fillText(p.text,p.x,p.y);
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }else{
      ctx.save();ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.x,p.y);ctx.rotate(p.rot+p.life*4);
      ctx.fillStyle='#ffe66b';star5(0,0,7,3.2);
      ctx.restore();ctx.globalAlpha=1;
    }
  }
}

// ---- helpers ----
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function star5(cx,cy,outer,inner){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const r=i%2?inner:outer;const a=Math.PI/5*i-Math.PI/2;
    const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  }
  ctx.closePath();ctx.fill();
}
})();
</script>
